apiVersion: 1

# Elimina cualquier datasource previo con este nombre antes de recrearlo.
# Necesario al fijar un uid nuevo sobre un datasource ya provisionado con uid autogenerado.
deleteDatasources:
  - name: InfluxDB
    orgId: 1

datasources:
  - name: InfluxDB
    uid: influxdb
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    database: iot
    isDefault: true
    editable: false
    jsonData:
      httpMode: GET
