services:

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: tpi-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
    networks:
      - iot-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-u", "${MOSQ_ADMIN_USER}", "-P", "${MOSQ_ADMIN_PASS}", "-t", "healthcheck", "-m", "ping", "-q", "0"]
      interval: 10s
      timeout: 5s
      retries: 3

  influxdb:
    image: influxdb:1.8
    container_name: tpi-influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=iot
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - iot-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  nodered:
    build: ./nodered
    container_name: tpi-nodered
    ports:
      - "1880:1880"
    environment:
      - MOSQ_USER=${MOSQ_NODERED_USER}
      - MOSQ_PASS=${MOSQ_NODERED_PASS}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_ADMIN_IDS=${TELEGRAM_ADMIN_IDS}
    volumes:
      - ./nodered/data:/data
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks:
      - iot-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: tpi-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/accesos.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - iot-net
    restart: unless-stopped

volumes:
  influxdb-data:
  grafana-data:

networks:
  iot-net:
    driver: bridge
